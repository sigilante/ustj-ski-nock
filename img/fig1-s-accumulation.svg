<svg viewBox="0 0 760 332" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .ink{fill:#1a1a1a}.mut{fill:#6b6b6b}
      .box{fill:none;stroke:#1a1a1a;stroke-width:1.3}
      .name{font-size:19px;fill:#1a1a1a}
      .mono{font-family:'DejaVu Sans Mono','Courier New',monospace}
      .sub{font-size:11px}.led{font-size:12.5px}
      .ttl{font-size:15px;font-style:italic}
    </style>
  </defs>

  <text x="380" y="26" text-anchor="middle" class="ink ttl">Each application feeds the next argument in as the subject.</text>

  <!-- flow boxes -->
  <g>
    <rect class="box" x="18"  y="52" width="120" height="50" rx="3"/>
    <rect class="box" x="210" y="52" width="120" height="50" rx="3"/>
    <rect class="box" x="402" y="52" width="120" height="50" rx="3"/>
    <rect class="box" x="594" y="52" width="148" height="50" rx="3"/>
    <text x="78"  y="83" text-anchor="middle" class="name">S</text>
    <text x="270" y="83" text-anchor="middle" class="name">S&#183;x</text>
    <text x="462" y="83" text-anchor="middle" class="name">S&#183;x&#183;y</text>
    <text x="668" y="83" text-anchor="middle" class="name">(x z)(y z)</text>
  </g>

  <!-- arrows + subject labels -->
  <g>
    <line x1="138" y1="77" x2="208" y2="77" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ar)"/>
    <line x1="330" y1="77" x2="400" y2="77" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ar)"/>
    <line x1="522" y1="77" x2="592" y2="77" stroke="#1a1a1a" stroke-width="1.3" marker-end="url(#ar)"/>
    <text x="173" y="44" text-anchor="middle" class="mut mono sub">&#183;x</text>
    <text x="365" y="44" text-anchor="middle" class="mut mono sub">&#183;y</text>
    <text x="557" y="44" text-anchor="middle" class="mut mono sub">&#183;z</text>
  </g>

  <!-- S definition -->
  <text x="18" y="142" class="ink mono led">S  =  [[1 [1 2]] [1 [0 1]] [[1 1] [0 1]]]</text>
  <line x1="18" y1="158" x2="742" y2="158" stroke="#cfcabb" stroke-width="1"/>

  <!-- reduction ledger: three aligned columns -->
  <g class="mono led">
    <text x="18"  y="190" class="ink">*[x S]</text>
    <text x="210" y="190" class="mut">&#8594;</text>
    <text x="238" y="190" class="ink">[[1 2] [0 1] [1 x]]</text>
    <text x="560" y="190" class="mut">= S&#183;x</text>

    <text x="18"  y="222" class="ink">*[y (S&#183;x)]</text>
    <text x="210" y="222" class="mut">&#8594;</text>
    <text x="238" y="222" class="ink">[2 y x]</text>
    <text x="560" y="222" class="mut">= S&#183;x&#183;y</text>

    <text x="18"  y="254" class="ink">*[z (S&#183;x&#183;y)]</text>
    <text x="210" y="254" class="mut">&#8594;</text>
    <text x="238" y="254" class="ink">*[*[z y] *[z x]]</text>
    <text x="560" y="254" class="mut">= (x z)(y z)</text>
  </g>

  <!-- convention footnote -->
  <text x="18" y="298" class="mut led">Convention: applying value <tspan class="mono ink">v</tspan> to argument <tspan class="mono ink">x</tspan> is <tspan class="mono ink">*[x v]</tspan> &#8212; the argument is the subject, the value is the formula.</text>
  <text x="18" y="318" class="mut led">Each builder captures one argument; the innermost <tspan class="mono ink">[2 &#183; &#183;]</tspan> layer fires on the last.</text>
</svg>
